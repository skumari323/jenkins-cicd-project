apiVersion: apps/v1
kind: Deployment

metadata:
  name: dev-app

spec:

  replicas: 1

  selector:
    matchLabels:
      app: dev-app

  template:

    metadata:
      labels:
        app: dev-app

    spec:

      containers:

      - name: app

        image: your-dockerhub-user/jenkins-cicd-project:v1

        ports:
        - containerPort: 80
